<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museo Virtual Bogotá - Prototipo Final</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        
        /* Estilos de la Landing Page */
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://desarrolloeconomico.gov.co/wp-content/uploads/2023/07/Panoramica-Calle-26-RicardoBaez-1-small.jpg');
            background-size: cover;
            background-position: center;
            height: 100vh;
        }

        /* Tarjetas de Museos/Obras */
        .card { 
            border-radius: 15px; 
            overflow: hidden; 
            transition: 0.3s; 
            border: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .card:hover { transform: translateY(-10px); }
        .card img { height: 220px; object-fit: cover; cursor: pointer; }
        
        /* Modal Personalizado */
        .modal-custom {
            display: none; 
            position: fixed; 
            z-index: 2000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(5px);
        }
        .modal-content-custom {
            background: white; 
            margin: 5% auto; 
            padding: 25px; 
            border-radius: 20px; 
            max-width: 600px; 
            position: relative;
        }
        .close-btn { position: absolute; right: 20px; top: 10px; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#" onclick="volverAlInicio()">🏛️ Bogotá Virtual</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="#" onclick="volverAlInicio()">Inicio</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="cambiarFiltro('museo')">Museos</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="cambiarFiltro('obra')">Obras de Arte</a></li>
                    <li class="nav-item">
                        <a class="nav-link text-warning" href="#" onclick="cambiarFiltro('favoritos')">
                            Favoritos ❤️ (<span id="fav-count-nav">0</span>)
                        </a>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="#contacto">Contáctanos</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section id="inicio" class="hero-section d-flex align-items-center justify-content-center text-center text-white">
        <div class="container">
            <h1 class="display-1 fw-bold">Bogotá es Arte</h1>
            <p class="fs-4 mb-4">Descubre la riqueza cultural de la capital.</p>
            <button class="btn btn-success btn-lg px-5 py-3 rounded-pill shadow" onclick="entrarAlMuseo()">
                Explorar Museos Ahora
            </button>
        </div>
    </section>

    <main id="contenido-principal" class="container mt-5 pt-5" style="display: none;">
        <h2 class="text-center mb-4" id="titulo-seccion">Nuestros Museos</h2>
        <div id="museos-container" class="row g-4"></div>
        
        <section id="contacto" class="my-5 p-4 bg-white rounded shadow-sm">
            <div class="max-width: 500px; margin: 0 auto; text-align: center;">
                <h2>📩 Contáctanos</h2>
                <form id="form-contacto" class="mt-4 text-start" style="max-width: 500px; margin: auto;">
                    <div class="mb-3">
                        <label class="form-label">Nombre completo</label>
                        <input type="text" id="nombre" class="form-control" placeholder="Ej: Juan Pérez">
                        <div id="error-nombre" class="text-danger small" style="display:none">Mínimo 3 caracteres.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="email" id="email" class="form-control" placeholder="correo@ejemplo.com">
                        <div id="error-email" class="text-danger small" style="display:none">Email inválido.</div>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 rounded-pill py-2">Enviar Mensaje</button>
                </form>
                <div id="mensaje-exito" class="mt-3 text-success fw-bold" style="display:none">¡Mensaje enviado con éxito!</div>
            </div>
        </section>
    </main>

    <div id="miModal" class="modal-custom">
        <div class="modal-content-custom text-center">
            <span class="close-btn" onclick="cerrarModal()">&times;</span>
            <img id="imgModal" src="" class="img-fluid rounded mb-3" style="max-height: 300px;">
            <h2 id="tituloModal"></h2>
            <h5 id="autorModal" class="text-success"></h5>
            <p id="descModal" class="text-muted"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const datos = [
            { id: 1, tipo: 'museo', nombre: "Museo del Oro", autor: "Banco de la República", desc: "La colección de orfebrería prehispánica más grande del mundo.", img: "https://cdn.colombia.com/sdi/2013/11/27/museo-del-oro-1141863.jpg" },
            { id: 2, tipo: 'museo', nombre: "Museo Botero", autor: "Fernando Botero", desc: "Colección de arte con obras de Botero, Picasso, Dalí y más.", img: "https://dynamic-media-cdn.tripadvisor.com/media/photo-o/17/21/8b/a4/photo0jpg.jpg?w=900&h=500&s=1" },
            { id: 3, tipo: 'museo', nombre: "Museo Nacional", autor: "MinCultura", desc: "El museo más antiguo de Colombia, ubicado en una antigua penitenciaría.", img: "https://bogota.gov.co/sites/default/files/2025-01/museo-nacional-programa-de-formacion-1.jpg" },
            { id: 4, tipo: 'museo', nombre: "MAMBO", autor: "Rogelio Salmona", desc: "Espacio dedicado a las artes plásticas modernas y contemporáneas.", img: "https://www.mambogota.com/wp-content/uploads/2024/07/mambo-fachada-1-min-scaled.jpg" },
            { id: 5, tipo: 'museo', nombre: "Museo de la Independencia", autor: "Guillermo Hernández de Alba y Luis Morales Gómez", desc: "Creado con el objetivo de conmemorar los 150 años del grito de independencia", img: "https://cloudfront-us-east-1.images.arcpublishing.com/infobae/EP7FHVXB65GRXMWPEME3GGQICQ.jpeg" },
            { id: 6, tipo: 'obra', nombre: "Violencia", autor: "Alejandro Obregón", desc: "Obra maestra que simboliza el conflicto armado en Colombia.", img: "https://lanuevabagatela.com/wp-content/uploads/2020/04/Alejandro-obrego%CC%81n-violencia-Detalle-928x580.png" },
            { id: 7, tipo: 'obra', nombre: "Mona lisa", autor: "Fernando Botero", desc: "La famosa versión de la Gioconda de Leonardo da Vinci.", img: "https://www.singulart.com/blog/wp-content/uploads/2024/02/Mona-Lisa-Age-Twelve-1-scaled.jpg" },
            { id: 8, tipo: 'obra', nombre: "The red dream", autor: "Guillermo Wiedemann", desc: "Muestra claramente lo que es el expresionismo abstracto", img: "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjMkCqM1uI4iHWnGJT2PC0OnpdgwojptF7Upz6jlOsO2TiYfME2_8Vhz06LQTPpO40kdV5g8fOAlnsQWahtGnI8IneKi3U0UOjll6J0-Yj_x6l5zu5R7GpSj9NXHidDbMEP8XmLU5HFjgz3/s1600/the+red+dream.jpg" },
            { id: 9, tipo: 'obra', nombre: "Balsa Muisca", autor: "Cultura Muisca", desc: "Pieza de oro que representa la ceremonia de El Dorado.", img: "https://upload.wikimedia.org/wikipedia/commons/9/99/Gold_Museum%2C_Bogota_%2836145671394%29.jpg" },
            { id: 10, tipo: 'obra', nombre: "Crisalida de Arrebol", autor: "Omar Rayo", desc: "Caracterizada por formas geométricas, líneas limpias y colores vibrantes (rojos, naranjas, rosados) que evocan los atardeceres del Valle del Cauca", img: "https://fundacioncorazonverde.org/wp-content/uploads/2021/05/min-016.png" },
            { id: 11, tipo: 'obra', nombre: "Las monjas y el cardenal", autor: "Débora Arango", desc: "La obra muestra a monjas vestidas de azul con expresiones intensas en torno a una jaula que contiene un ave cardenal roja, simbolizando la represión de la pasión y la libertad bajo el orden religioso", img: "https://www.elmamm.org/content/uploads/2024/11/img-las-monjas-y-el-cardenal-y-o-el-recreo-VSDyd8.jpg" },
        ];

        let favoritos = JSON.parse(localStorage.getItem('favs')) || [];
        let filtroActual = 'museo';

        // Navegación
        function entrarAlMuseo() {
            document.getElementById('inicio').classList.add('d-none');
            document.getElementById('contenido-principal').style.display = 'block';
            cambiarFiltro('museo');
        }

        function volverAlInicio() {
            document.getElementById('inicio').classList.remove('d-none');
            document.getElementById('contenido-principal').style.display = 'none';
        }

        function cambiarFiltro(nuevoFiltro) {
            filtroActual = nuevoFiltro;
            document.getElementById('inicio').classList.add('d-none');
            document.getElementById('contenido-principal').style.display = 'block';
            
            const titulo = document.getElementById('titulo-seccion');
            titulo.innerText = nuevoFiltro === 'museo' ? "Nuestros Museos" : (nuevoFiltro === 'obra' ? "Colecciones de Arte" : "Mis Favoritos ❤️");
            
            renderizar();
        }

        function renderizar() {
            const container = document.getElementById('museos-container');
            container.innerHTML = '';
            
            let filtrados = (filtroActual === 'favoritos') 
                ? datos.filter(item => favoritos.includes(item.id)) 
                : datos.filter(item => item.tipo === filtroActual);

            if (filtrados.length === 0 && filtroActual === 'favoritos') {
                container.innerHTML = "<p class='text-center w-100'>No tienes favoritos aún. ❤️</p>";
            }

            filtrados.forEach(item => {
                const isFav = favoritos.includes(item.id) ? '❤️' : '🤍';
                container.innerHTML += `
                    <div class="col-md-4">
                        <div class="card h-100 shadow-sm">
                            <img src="${item.img}" onclick="abrirModal(${item.id})">
                            <div class="card-body text-center">
                                <h3>${item.nombre}</h3>
                                <p class="text-muted small">${item.autor}</p>
                                <button class="btn btn-outline-dark border-0 fs-3" onclick="toggleFav(${item.id})">${isFav}</button>
                            </div>
                        </div>
                    </div>`;
            });
            document.getElementById('fav-count-nav').innerText = favoritos.length;
        }

        function toggleFav(id) {
            favoritos.includes(id) ? favoritos = favoritos.filter(f => f !== id) : favoritos.push(id);
            localStorage.setItem('favs', JSON.stringify(favoritos));
            renderizar();
        }

        function abrirModal(id) {
            const item = datos.find(d => d.id === id);
            document.getElementById('imgModal').src = item.img;
            document.getElementById('tituloModal').innerText = item.nombre;
            document.getElementById('autorModal').innerText = item.autor;
            document.getElementById('descModal').innerText = item.desc;
            document.getElementById('miModal').style.display = "block";
        }

        function cerrarModal() { document.getElementById('miModal').style.display = "none"; }

        // Validación Formulario
        document.getElementById('form-contacto').addEventListener('submit', function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre');
            const email = document.getElementById('email');
            const regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            let val = true;

            if (nombre.value.length < 3) { document.getElementById('error-nombre').style.display = 'block'; val = false; }
            else document.getElementById('error-nombre').style.display = 'none';

            if (!regexEmail.test(email.value)) { document.getElementById('error-email').style.display = 'block'; val = false; }
            else document.getElementById('error-email').style.display = 'none';

            if (val) {
                document.getElementById('mensaje-exito').style.display = 'block';
                this.reset();
                setTimeout(() => document.getElementById('mensaje-exito').style.display = 'none', 3000);
            }
        });

        // Al cargar, inicializar contadores
        document.getElementById('fav-count-nav').innerText = favoritos.length;
    </script>
</body>
</html>
